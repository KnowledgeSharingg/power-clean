<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AI-Powered Book Registration</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#137fec",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              display: ["Plus Jakarta Sans"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        min-height: 100dvh;
      }
      .custom-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white flex flex-col"
  >
    <header
      class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800"
    >
      <div class="flex items-center p-4 justify-between max-w-md mx-auto">
        <div class="flex size-10 items-center justify-start">
          <span class="material-symbols-outlined cursor-pointer"
            >arrow_back_ios</span
          >
        </div>
        <h2
          class="text-lg font-bold leading-tight tracking-tight flex-1 text-center"
        >
          Register New Book
        </h2>
        <div class="flex size-10 items-center justify-end">
          <button
            class="flex items-center justify-center rounded-lg text-primary"
          >
            <span class="material-symbols-outlined">barcode_scanner</span>
          </button>
        </div>
      </div>
    </header>
    <main class="flex-1 max-w-md mx-auto w-full pb-32">
      <div class="px-4 pt-6 pb-2">
        <h3
          class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-[#92adc9] mb-3"
        >
          1. Book Identification
        </h3>
        <div class="flex flex-col gap-3">
          <div
            class="flex w-full items-stretch rounded-xl h-12 bg-white dark:bg-[#233648] shadow-sm border border-slate-200 dark:border-none overflow-hidden"
          >
            <div class="text-[#92adc9] flex items-center justify-center pl-4">
              <span class="material-symbols-outlined">search</span>
            </div>
            <input
              class="form-input w-full border-none bg-transparent focus:ring-0 text-base font-normal placeholder:text-slate-400 dark:placeholder:text-[#92adc9] px-3"
              placeholder="Enter book name..."
              value="The Midnight Library"
            />
          </div>
          <button
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-lg shadow-indigo-500/20"
          >
            <span class="material-symbols-outlined text-[20px]"
              >magic_button</span
            >
            <span>AI Auto-Fill Details</span>
          </button>
        </div>
      </div>
      <section class="px-4 mt-6 space-y-5">
        <h3
          class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-[#92adc9]"
        >
          2. Book Information
        </h3>
        <div>
          <label
            class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1.5 ml-1"
            >Book Title</label
          >
          <input
            class="w-full rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-[#1a2632] px-4 py-3 text-base font-semibold focus:ring-2 focus:ring-primary focus:border-transparent transition"
            type="text"
            value="The Midnight Library"
          />
        </div>
        <div>
          <label
            class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1.5 ml-1"
            >Book Summary</label
          >
          <textarea
            class="w-full min-h-[100px] rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-[#1a2632] p-4 text-sm leading-relaxed focus:ring-2 focus:ring-primary focus:border-transparent transition"
            placeholder="AI will generate this..."
          >
Between life and death there is a library, and within that library, the shelves go on forever. Every book provides a chance to try another life you could have lived...</textarea
          >
        </div>
        <div>
          <label
            class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1.5 ml-1"
            >Book Link (Store/Goodreads)</label
          >
          <div
            class="flex w-full items-stretch rounded-xl bg-white dark:bg-[#1a2632] border border-slate-200 dark:border-slate-800 overflow-hidden"
          >
            <div class="text-slate-400 flex items-center justify-center pl-4">
              <span class="material-symbols-outlined text-sm">link</span>
            </div>
            <input
              class="form-input w-full border-none bg-transparent focus:ring-0 text-sm py-3 px-3"
              placeholder="https://..."
              value="https://www.goodreads.com/book/show/52578297-the-midnight-library"
            />
          </div>
        </div>
      </section>
      <section class="px-4 mt-8 space-y-5">
        <h3
          class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-[#92adc9]"
        >
          3. Your Social Post
        </h3>
        <div>
          <label
            class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1.5 ml-1"
            >Post Title</label
          >
          <input
            class="w-full rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-[#1a2632] px-4 py-3 text-base font-semibold focus:ring-2 focus:ring-primary focus:border-transparent transition placeholder:font-normal"
            placeholder="Catchy title for your review..."
            type="text"
            value="A journey through infinite lives"
          />
        </div>
        <div>
          <label
            class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1.5 ml-1"
            >Post Content</label
          >
          <textarea
            class="w-full min-h-[140px] rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-[#1a2632] p-4 text-base focus:ring-2 focus:ring-primary focus:border-transparent transition"
            placeholder="Share your personal thoughts, review, or favorite quotes..."
          ></textarea>
        </div>
        <div>
          <label
            class="block text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase mb-1.5 ml-1"
            >Physical Book Photo</label
          >
          <div class="relative group">
            <div
              class="w-full aspect-video rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-[#1a2632] flex flex-col items-center justify-center gap-2 cursor-pointer transition hover:border-primary/50"
            >
              <div class="bg-primary/10 text-primary p-3 rounded-full">
                <span class="material-symbols-outlined">add_a_photo</span>
              </div>
              <p class="text-sm font-medium text-slate-500 dark:text-slate-400">
                Upload or snap a photo
              </p>
              <p class="text-[10px] text-slate-400 uppercase">Optional</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div
      class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800"
    >
      <div class="max-w-md mx-auto">
        <button
          class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition active:scale-95"
        >
          <span>Register &amp; Post</span>
          <span class="material-symbols-outlined">publish</span>
        </button>
      </div>
    </div>
  </body>
</html>
