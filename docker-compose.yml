services:
  mysql:
    image: mysql:8.0
    container_name: power-clean-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-verysecret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mydatabase}
      MYSQL_USER: ${MYSQL_USER:-myuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - power-clean-network

  server:
    build:
      context: ./server
    container_name: power-clean-server
    ports:
      - "${SERVER_PORT:-8083}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-mydatabase}?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-myuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-secret}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ALADIN_TTB_KEY: ${ALADIN_TTB_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - power-clean-network

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: power-clean-client
    ports:
      - "${CLIENT_PORT:-3003}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      INTERNAL_API_URL: http://server:8080
    depends_on:
      - server
    networks:
      - power-clean-network

  admin:
    build:
      context: ./admin
    container_name: power-clean-admin
    ports:
      - "${ADMIN_PORT:-3004}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - server
    networks:
      - power-clean-network

volumes:
  mysql-data:

networks:
  power-clean-network:
    driver: bridge
